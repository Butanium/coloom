# coloom server config — copy to coloom.yaml (auto-loaded from cwd) or pass --config.
endpoints:
  gpt4-base:
    base_url: https://api.openai.com/v1
    model: gpt-4-base
    api_key_env: OPENAI_API_KEY
    params:
      temperature: 1.0
      max_tokens: 64
      logprobs: 5  # OpenAI completions caps top-k logprobs at 5
      n: 3
  # llama-server / vLLM are first-class targets too:
  # local:
  #   base_url: http://127.0.0.1:8080/v1
  #   model: whatever-the-server-serves
  #   params: {temperature: 1.0, max_tokens: 64, logprobs: 20, n: 3}
  # for dev/UI testing without burning credit: `uv run coloom-fake-openai` then
  gpt-fake:
    base_url: http://127.0.0.1:9999/v1
    model: gpt-fake
    params: {temperature: 1.0, max_tokens: 24, logprobs: 5, n: 3}

presets:
  default:
    endpoint: gpt4-base
  wild:
    endpoint: gpt4-base
    params: {temperature: 1.4}
  single-token:
    # token-level looming: branch one token at a time, read top_logprobs
    endpoint: gpt4-base
    params: {max_tokens: 1, n: 1}

default_preset: default
